<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/mecha-ui.css">
    <title>Mecha Inventory | Gaming Store</title>
</head>
<body class="mecha-theme">
    <div id="bg-animation-layer"></div>

    <header>
        <div class="logo">MECHA.STORE</div>
        <div class="stats-bar">
            <span>CREDITS: 99,999</span>
        </div>
    </header>

    <main id="inventory-grid">
        
        <div class="item-card">
            <div class="item-stats">LVL. 99 | HIGH-PRECISION</div>
            <div class="item-image">
                <img src="https://via.placeholder.com/150?text=MECHA+MOUSE" alt="Product">
            </div>
            <h3>AORUS M5 MECHA</h3>
            <div class="item-price">RM 249.00</div>
            
            <div style="width: 100%; background: #ddd; height: 5px; margin: 10px 0;">
                <div style="width: 70%; background: var(--xanthous); height: 100%;"></div>
            </div>
            <small>STOCK DURABILITY: 70%</small>

            <button class="btn-buy">EQUIP ITEM (BUY)</button>
        </div>
        </main>

    <script src="js/inventory.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
